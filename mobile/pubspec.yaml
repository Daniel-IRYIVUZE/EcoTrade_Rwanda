name: ecotrade_mobile
description: Ecotrade - Turn Waste into Value
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Animation
  cupertino_icons: ^1.0.6
  animated_splash_screen: ^1.3.0
  lottie: ^2.7.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.0
  page_view_dot_indicator: ^2.3.0
  flutter_native_splash: ^2.3.5
  flutter_launcher_icons: ^0.13.1
  
  # State Management
  provider: ^6.1.1
  riverpod: ^2.5.0
  flutter_riverpod: ^2.4.9
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.1
  path: ^1.8.0
  
  # Maps & Location
  flutter_map: ^6.1.0
  map_launcher: ^3.2.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  latlong2: ^0.9.0
  
  # Networking & Sync
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  flutter_offline: ^3.0.0
  
  # Camera & Image
  camera: ^0.10.5
  image_picker: ^1.0.5
  
  # Authentication
  local_auth: ^2.1.7
  flutter_secure_storage: ^9.0.0
  
  # Payments
  flutter_stripe: ^9.4.0
  
  # Charts & Analytics
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.44
  
  # Notifications
  flutter_local_notifications: ^16.2.0
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0
  share_plus: ^7.2.2
  
  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.11.1
  
  # Drag & Drop
  drag_and_drop_lists: ^0.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
    
flutter_native_splash:
  color: "#0F4C3A"
  image: assets/images/ecotrade_logo.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ecotrade_logo.png"
  adaptive_icon_background: "#0F4C3A"
  adaptive_icon_foreground: "#FFFFFF"